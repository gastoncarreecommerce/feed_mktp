name: Actualizar Feed Dynamic Yield
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Instalar dependencias
        run: npm install
        
      - name: Generar Feed Unificado
        run: node index.js
        
      - name: Subir a Dynamic Yield via SFTP (PRODUCCIÓN)
        env:
          PRIVATE_KEY: ${{ secrets.DY_SFTP_PRIVATE_KEY }}
          USER: ${{ secrets.DY_SFTP_USERNAME }}
          HOST: ${{ secrets.DY_SFTP_HOST }}
        run: |
          # Preparamos archivo y llave
          mv feed_unificado.csv productfeed.csv
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # Confiamos en el host
          mkdir -p ~/.ssh
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          
          # Subimos por SFTP
          echo "put productfeed.csv" > sftp_batch
          sftp -b sftp_batch -i private_key.pem $USER@$HOST

      - name: Guardar CSV para descargar manual (Respaldo)
        uses: actions/upload-artifact@v4
        with:
          name: Mi_Feed_Dynamic_Yield_PROD
          path: productfeed.csv
          retention-days: 5
